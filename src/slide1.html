<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Instagram Carousel - Slide 1</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #f7f7f5;
      --text: #111111;
      --muted: #5f6368;
      --accent: #ff6b4a;
      --secondary: #5b5f97;
      --card: rgba(255,255,255,0.55);
      --line: rgba(17,17,17,0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #dcdcdc;
      font-family: "Cairo", sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 24px;
    }

    .slide {
      width: 1080px;
      height: 1350px;
      background: var(--bg);
      position: relative;
      overflow: hidden;
      color: var(--text);
      padding: 72px 72px 60px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      isolation: isolate;
    }

    .slide::before {
      content: "";
      position: absolute;
      width: 620px;
      height: 620px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,107,74,0.14) 0%, rgba(255,107,74,0.03) 55%, rgba(255,107,74,0) 75%);
      top: -160px;
      left: -150px;
      z-index: -2;
    }

    .slide::after {
      content: "";
      position: absolute;
      width: 420px;
      height: 420px;
      border-radius: 50%;
      border: 1px solid rgba(91,95,151,0.14);
      bottom: -130px;
      right: -90px;
      z-index: -2;
    }

    .grid-lines {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(to right, transparent 0, transparent calc(100% - 1px), rgba(17,17,17,0.025) calc(100% - 1px)),
        linear-gradient(to bottom, transparent 0, transparent calc(100% - 1px), rgba(17,17,17,0.025) calc(100% - 1px));
      background-size: 120px 120px;
      pointer-events: none;
      z-index: -3;
    }

    .top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 20px;
    }

    .label {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 1.5px;
      color: var(--secondary);
      text-transform: uppercase;
      background: rgba(91,95,151,0.08);
      border: 1px solid rgba(91,95,151,0.12);
      padding: 10px 18px;
      border-radius: 999px;
      backdrop-filter: blur(6px);
    }

    .slide-no {
      font-size: 210px;
      font-weight: 900;
      line-height: 0.85;
      color: rgba(17,17,17,0.05);
      user-select: none;
    }

    .content {
      margin-top: 10px;
      max-width: 760px;
      position: relative;
      z-index: 2;
    }

    .mini {
      font-size: 24px;
      font-weight: 700;
      color: var(--muted);
      margin-bottom: 22px;
    }

    .title {
      margin: 0;
      font-size: 108px;
      line-height: 1.05;
      font-weight: 900;
      letter-spacing: -2px;
    }

    .title .accent {
      color: var(--accent);
    }

    .text-box {
      margin-top: 34px;
      max-width: 760px;
      background: var(--card);
      border: 1px solid rgba(17,17,17,0.08);
      border-radius: 28px;
      padding: 28px 30px;
      box-shadow: 0 10px 30px rgba(17,17,17,0.04);
      backdrop-filter: blur(10px);
    }

    .text {
      margin: 0;
      font-size: 37px;
      line-height: 1.8;
      color: #2c2c2c;
      font-weight: 600;
    }

    .bottom {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
      margin-top: 30px;
    }

    .brand {
      font-size: 24px;
      font-weight: 700;
      color: var(--muted);
    }

    .progress {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .progress span {
      display: block;
      width: 48px;
      height: 6px;
      border-radius: 999px;
      background: rgba(17,17,17,0.08);
    }

    .progress span.active {
      width: 76px;
      background: var(--accent);
    }

    .corner-badge {
      position: absolute;
      bottom: 145px;
      left: 72px;
      background: #111;
      color: #fff;
      border-radius: 20px;
      padding: 14px 18px;
      font-size: 22px;
      font-weight: 800;
      box-shadow: 0 12px 24px rgba(0,0,0,0.12);
    }
  </style>
</head>
<body>

  <section class="slide">
    <div class="grid-lines"></div>

    <div class="top">
      <div class="label">SELF IMPROVEMENT</div>
      <div class="slide-no">01</div>
    </div>

    <div class="content">
      <div class="mini">Carousel Post</div>

      <h1 class="title">
        <span class="accent">5</span> عادات<br>
        تغيّر حياتك
      </h1>

      <div class="text-box">
        <p class="text">
          😳 مو لازم تغيّر حياتك كلها دفعة وحدة.<br>
          أحيانًا 5 عادات صغيرة كافية حتى تقلب يومك ونتيجتك بالكامل.
        </p>
      </div>
    </div>

    <div class="corner-badge">ابدأ من هنا</div>

    <div class="bottom">
      <div class="brand">@yourpage</div>

      <div class="progress" aria-label="slide progress">
        <span class="active"></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
      </div>
    </div>
  </section>

</body>
</html>
