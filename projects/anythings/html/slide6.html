<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FrameX - Slide 6 (Iraqi Dialect)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f7f7f5;
      --text: #111111;
      --muted: #5f6368;
      --accent: #ff6b4a;
      --line: rgba(17,17,17,0.08);
      --card-dark: #111111;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: #dcdcdc;
      font-family: "Cairo", sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .slide {
      width: 1080px;
      height: 1350px;
      position: relative;
      overflow: hidden;
      color: var(--text);
      background: var(--bg);
    }

    .grid-lines {
      position: absolute;
      inset: 0;
      background-image: linear-gradient(var(--line) 1px, transparent 1px), linear-gradient(90deg, var(--line) 1px, transparent 1px);
      background-size: 100px 100px;
      z-index: 1;
    }

    .top {
      position: absolute;
      top: 60px;
      left: 72px;
      right: 72px;
      z-index: 10;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .label {
      font-size: 22px;
      font-weight: 800;
      border: 1px solid var(--text);
      padding: 10px 20px;
      border-radius: 999px;
    }

    .counter { font-size: 24px; font-weight: 700; color: var(--muted); }

    .content {
      position: relative;
      z-index: 10;
      padding: 220px 72px 0;
    }

    .mini {
      font-size: 30px;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 20px;
    }

    .title {
      font-size: 90px;
      font-weight: 900;
      line-height: 1.1;
      margin-bottom: 50px;
    }

    .accent-text { color: var(--accent); }

    .solution-box {
      background: var(--card-dark);
      color: white;
      padding: 50px;
      border-radius: 32px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.1);
    }

    .solution-box h3 {
      font-size: 40px;
      font-weight: 800;
      margin: 0 0 30px;
      color: var(--accent);
    }

    .chips {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .chip {
      background: rgba(255,255,255,0.1);
      padding: 25px 30px;
      border-radius: 16px;
      font-size: 28px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 20px;
      border: 1px solid rgba(255,255,255,0.05);
    }

    .chip::before {
      content: "✓";
      color: #2ecc71;
      font-weight: 900;
    }

    .footer {
      position: absolute;
      bottom: 50px;
      left: 72px;
      right: 72px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .brand { font-size: 28px; font-weight: 800; }

    .progress { display: flex; gap: 12px; }
    .progress span { width: 48px; height: 6px; border-radius: 999px; background: var(--line); }
    .progress span.active { width: 76px; background: var(--accent); }
  </style>
</head>
<body>

  <section class="slide">
    <div class="grid-lines"></div>

    <div class="top">
      <div class="label">رؤية FrameX</div>
      <div class="counter">6/7</div>
    </div>

    <div class="content">
      <p class="mini">شلون تنجح؟</p>
      <h1 class="title">إعلانك لازم يصير <span class="accent-text">"ماكينة"</span></h1>

      <div class="solution-box">
        <h3>الخطة اللي تجيب فلوس:</h3>
        <div class="chips">
          <div class="chip">استهدف ناس "محتاجينك" فعلاً</div>
          <div class="chip">رد سريع وبروح حلوة (مو نفسية)</div>
          <div class="chip">قدم عرض يخلي الزبون يحس بالربح</div>
        </div>
      </div>
    </div>

    <div class="footer">
      <div class="brand">@framex</div>
      <div class="progress">
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span class="active"></span>
        <span></span>
      </div>
    </div>
  </section>

</body>
</html>
