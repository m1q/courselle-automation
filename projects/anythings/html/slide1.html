<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FrameX - Slide 1 (Iraqi Dialect)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f0f10;
      --text: #ffffff;
      --accent: #ff6b4a;
      --muted: rgba(255, 255, 255, 0.7);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: #dcdcdc;
      font-family: "Cairo", sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .slide {
      width: 1080px;
      height: 1350px;
      position: relative;
      overflow: hidden;
      color: var(--text);
      background: var(--bg);
    }

    /* خلفية الصورة مع تعتيم سينمائي */
    .hero-image {
      position: absolute;
      inset: 0;
      z-index: 1;
    }

    .hero-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.45;
    }

    .hero-image::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(15,15,16,0.1) 0%, rgba(15,15,16,0.95) 100%);
    }

    .top {
      position: absolute;
      top: 60px;
      left: 72px;
      right: 72px;
      z-index: 10;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .label {
      font-size: 22px;
      font-weight: 800;
      background: rgba(255, 255, 255, 0.1);
      padding: 10px 24px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .counter {
      font-size: 24px;
      font-weight: 700;
      color: var(--muted);
    }

    .content {
      position: absolute;
      bottom: 180px;
      left: 72px;
      right: 72px;
      z-index: 10;
    }

    .mini {
      font-size: 30px;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 20px;
      letter-spacing: 0.5px;
    }

    .title {
      font-size: 100px;
      font-weight: 900;
      line-height: 1.1;
      margin: 0;
    }

    .accent-text {
      color: var(--accent);
    }

    .footer {
      position: absolute;
      bottom: 50px;
      left: 72px;
      right: 72px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 10;
    }

    .brand {
      font-size: 28px;
      font-weight: 800;
    }

    .progress {
      display: flex;
      gap: 12px;
    }

    .progress span {
      width: 48px;
      height: 6px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.2);
    }

    .progress span.active {
      width: 76px;
      background: var(--accent);
    }
  </style>
</head>
<body>

  <section class="slide">
    <div class="hero-image">
      <img src="https://images.unsplash.com/photo-1553877522-43269d4ea984?q=80&w=1080&auto=format&fit=crop" alt="Iraqi Business Context">
    </div>

    <div class="top">
      <div class="label">رؤية FrameX</div>
      <div class="counter">1/7</div>
    </div>

    <div class="content">
      <p class="mini">المشكلة مو بـ "زر التمويل"</p>
      <h1 class="title">
        مموّل إعلانك..<br>
        بس ماكو<br>
        <span class="accent-text">مبيعات؟</span>
      </h1>
    </div>

    <div class="footer">
      <div class="brand">@framex</div>
      <div class="progress">
        <span class="active"></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
      </div>
    </div>
  </section>

</body>
</html>
