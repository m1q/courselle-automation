<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسويق رقمي - الشريحة 5</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), url('https://images.unsplash.com/photo-1556742049-0cfed4f6a45d?ixlib=rb-4.0.3&auto=format&fit=crop&w=1080&q=80');
            background-size: cover;
            background-position: center;
            color: white;
            width: 1080px;
            height: 1350px;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            padding: 40px;
        }
        
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 60px;
        }
        
        .label {
            background: rgba(255, 255, 255, 0.15);
            color: #ff6b6b;
            padding: 8px 20px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 18px;
            backdrop-filter: blur(10px);
        }
        
        .counter {
            color: rgba(255, 255, 255, 0.7);
            font-weight: 600;
            font-size: 18px;
        }
        
        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
            z-index: 2;
        }
        
        .trust-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 24px;
            padding: 50px;
            max-width: 800px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .card-title {
            font-size: 42px;
            font-weight: 800;
            margin-bottom: 25px;
            color: #1a1a1a;
            line-height: 1.2;
        }
        
        .card-text {
            font-size: 26px;
            line-height: 1.6;
            color: #4a4a4a;
            margin-bottom: 30px;
        }
        
        .highlight {
            color: #ff6b6b;
            font-weight: 700;
        }
        
        .stats {
            display: flex;
            gap: 40px;
            margin-top: 30px;
        }
        
        .stat-item {
            text-align: center;
        }
        
        .stat-number {
            font-size: 36px;
            font-weight: 900;
            color: #ff6b6b;
            margin-bottom: 5px;
        }
        
        .stat-label {
            font-size: 18px;
            color: #666;
            font-weight: 600;
        }
        
        .footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: auto;
            padding-top: 40px;
            border-top: 1px solid rgba(255, 255, 255, 0.15);
            position: relative;
            z-index: 2;
        }
        
        .brand {
            color: rgba(255, 255, 255, 0.7);
            font-weight: 600;
            font-size: 20px;
        }
        
        .progress {
            display: flex;
            gap: 8px;
        }
        
        .progress-bar {
            width: 40px;
            height: 4px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
        }
        
        .progress-bar.active {
            background: #ff6b6b;
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <div class="label">الثقة تبنى</div>
        <div class="counter">5/7</div>
    </div>
    
    <div class="content">
        <div class="trust-card">
            <div class="card-title">
                الشركات اللي <span class="highlight">تبني ثقة</span><br>
                تبيع أكثر بـ ٣ أضعاف
            </div>
            <div class="card-text">
                الثقة مو شعار تكتبه. هي مجموعة أفعال:<br>
                الرد السريع، الشفافية في الأسعار، صور حقيقية،<br>
                قصص حقيقية لعملاء حقيقيين.
            </div>
            
            <div class="stats">
                <div class="stat-item">
                    <div class="stat-number">٨٧٪</div>
                    <div class="stat-label">زيادة في المبيعات</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number">٦٥٪</div>
                    <div class="stat-label">توصية من زبون لآخر</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number">٩٢٪</div>
                    <div class="stat-label">ثقة متكررة</div>
                </div>
            </div>
        </div>
    </div>
    
    <div class="footer">
        <div class="brand">@framex</div>
        <div class="progress">
            <div class="progress-bar active"></div>
            <div class="progress-bar active"></div>
            <div class="progress-bar active"></div>
            <div class="progress-bar active"></div>
            <div class="progress-bar active"></div>
            <div class="progress-bar"></div>
            <div class="progress-bar"></div>
        </div>
    </div>
</body>
</html>
