<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسويق رقمي - الشريحة 2</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Cairo', sans-serif;
            background: #f8f9fa;
            color: #1a1a1a;
            width: 1080px;
            height: 1350px;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            padding: 40px;
        }
        
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 60px;
        }
        
        .label {
            background: rgba(255, 107, 107, 0.1);
            color: #ff6b6b;
            padding: 8px 20px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 18px;
        }
        
        .counter {
            color: rgba(26, 26, 26, 0.6);
            font-weight: 600;
            font-size: 18px;
        }
        
        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        
        .eyebrow {
            color: #ff6b6b;
            font-weight: 700;
            font-size: 24px;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .headline {
            font-size: 72px;
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 40px;
            color: #1a1a1a;
        }
        
        .card {
            background: white;
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
            border: 1px solid rgba(0, 0, 0, 0.05);
        }
        
        .card-title {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 20px;
            color: #1a1a1a;
        }
        
        .card-text {
            font-size: 24px;
            line-height: 1.6;
            color: #4a4a4a;
        }
        
        .accent {
            color: #ff6b6b;
            font-weight: 700;
        }
        
        .footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: auto;
            padding-top: 40px;
            border-top: 1px solid rgba(0, 0, 0, 0.1);
        }
        
        .brand {
            color: rgba(26, 26, 26, 0.7);
            font-weight: 600;
            font-size: 20px;
        }
        
        .progress {
            display: flex;
            gap: 8px;
        }
        
        .progress-bar {
            width: 40px;
            height: 4px;
            background: rgba(0, 0, 0, 0.1);
            border-radius: 2px;
        }
        
        .progress-bar.active {
            background: #ff6b6b;
        }
        
        .grid-bg {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                linear-gradient(rgba(0, 0, 0, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 0, 0, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: -1;
        }
    </style>
</head>
<body>
    <div class="grid-bg"></div>
    
    <div class="top-bar">
        <div class="label">الحقيقة اللي ما تحكيها</div>
        <div class="counter">2/7</div>
    </div>
    
    <div class="content">
        <h1 class="headline">
            المشكلة <span class="accent">مو</span> في<br>
            المنتج ولا السعر
        </h1>
        
        <div class="card">
            <div class="card-title">الزبون العراقي يشتري من اللي يثق فيه</div>
            <div class="card-text">
                التسويق الرقمي مو بس نشر بوستات. هو بناء ثقة.<br>
                الزبون العراقي يبحث عن شخص يثق فيه قبل ما يشتري.<br>
                إذا ما عرفتك، ما راح يشتري منك حتى لو منتجك أحسن.
            </div>
        </div>
    </div>
    
    <div class="footer">
        <div class="brand">@framex</div>
        <div class="progress">
            <div class="progress-bar active"></div>
            <div class="progress-bar active"></div>
            <div class="progress-bar"></div>
            <div class="progress-bar"></div>
            <div class="progress-bar"></div>
            <div class="progress-bar"></div>
            <div class="progress-bar"></div>
        </div>
    </div>
</body>
</html>
