<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Slide 2</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #f7f7f5;
      --text: #111111;
      --muted: #5f6368;
      --accent: #ff6b4a;
      --secondary: #5b5f97;
      --card: rgba(255,255,255,0.88);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #dcdcdc;
      font-family: "Cairo", sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 24px;
    }

    .slide {
      width: 1080px;
      height: 1350px;
      background: var(--bg);
      position: relative;
      overflow: hidden;
      color: var(--text);
      padding: 72px 72px 140px;
      isolation: isolate;
    }

    .slide::before {
      content: "";
      position: absolute;
      width: 560px;
      height: 560px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(91,95,151,0.10) 0%, rgba(91,95,151,0.03) 55%, rgba(91,95,151,0) 75%);
      top: -200px;
      left: -170px;
      z-index: -2;
    }

    .slide::after {
      content: "";
      position: absolute;
      width: 430px;
      height: 430px;
      border-radius: 50%;
      border: 1px solid rgba(255,107,74,0.12);
      bottom: -150px;
      right: -110px;
      z-index: -2;
    }

    .grid-lines {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(to right, transparent 0, transparent calc(100% - 1px), rgba(17,17,17,0.02) calc(100% - 1px)),
        linear-gradient(to bottom, transparent 0, transparent calc(100% - 1px), rgba(17,17,17,0.02) calc(100% - 1px));
      background-size: 120px 120px;
      pointer-events: none;
      z-index: -3;
    }

    .top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 20px;
      margin-bottom: 40px;
    }

    .label {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 1.2px;
      color: var(--secondary);
      text-transform: uppercase;
      background: rgba(91,95,151,0.08);
      border: 1px solid rgba(91,95,151,0.12);
      padding: 10px 18px;
      border-radius: 999px;
    }

    .slide-no {
      font-size: 210px;
      font-weight: 900;
      line-height: 0.85;
      color: rgba(17,17,17,0.05);
      user-select: none;
      margin-top: -8px;
    }

    .content {
      position: relative;
      min-height: 930px;
    }

    .big-word {
      position: absolute;
      top: 60px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 210px;
      font-weight: 900;
      letter-spacing: -4px;
      color: rgba(91,95,151,0.08);
      line-height: 1;
      user-select: none;
    }

    .card {
      position: relative;
      margin: 210px auto 0;
      width: 100%;
      max-width: 860px;
      background: var(--card);
      border: 1px solid rgba(17,17,17,0.08);
      border-radius: 38px;
      padding: 46px 42px 42px;
      box-shadow: 0 16px 38px rgba(17,17,17,0.06);
      backdrop-filter: blur(10px);
    }

    .card::before {
      content: "";
      position: absolute;
      top: 22px;
      right: 24px;
      width: 82px;
      height: 10px;
      border-radius: 999px;
      background: rgba(255,107,74,0.16);
    }

    .mini {
      font-size: 22px;
      font-weight: 700;
      color: var(--muted);
      margin-bottom: 18px;
      text-align: center;
    }

    .title {
      margin: 0 0 24px;
      font-size: 74px;
      line-height: 1.12;
      font-weight: 900;
      letter-spacing: -1.4px;
      text-align: center;
    }

    .title .accent {
      color: var(--accent);
    }

    .text {
      margin: 0 auto;
      font-size: 33px;
      line-height: 1.95;
      color: #2c2c2c;
      font-weight: 600;
      max-width: 720px;
      text-align: center;
    }

    .note {
      margin: 34px auto 0;
      width: fit-content;
      padding: 14px 22px;
      border-radius: 999px;
      background: rgba(91,95,151,0.08);
      border: 1px solid rgba(91,95,151,0.10);
      color: var(--secondary);
      font-size: 22px;
      font-weight: 800;
    }

    .bottom {
      position: absolute;
      left: 72px;
      right: 72px;
      bottom: 50px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
    }

    .brand {
      font-size: 24px;
      font-weight: 700;
      color: var(--muted);
    }

    .progress {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .progress span {
      display: block;
      width: 48px;
      height: 6px;
      border-radius: 999px;
      background: rgba(17,17,17,0.08);
    }

    .progress span.active {
      width: 76px;
      background: var(--accent);
    }
  </style>
</head>
<body>

  <section class="slide">
    <div class="grid-lines"></div>

    <div class="top">
      <div class="label">رؤية FrameX</div>
      <div class="slide-no">02</div>
    </div>

    <div class="content">
      <div class="big-word">BOOST</div>

      <div class="card">
        <div class="mini">Before You Promote</div>

        <h1 class="title">
          الخطأ ليس في<br>
          <span class="accent">زر التمويل</span>
        </h1>

        <p class="text">
          المشكلة ليست أنك ضغطت “تمويل”.
          المشكلة أنك بدأت الإعلان قبل أن تعرف
          ماذا تريد منه أصلًا.
        </p>

        <div class="note">ابدأ بالهدف أولًا</div>
      </div>
    </div>

    <div class="bottom">
      <div class="brand">@framex</div>

      <div class="progress" aria-label="slide progress">
        <span></span>
        <span class="active"></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
      </div>
    </div>
  </section>

</body>
</html>
