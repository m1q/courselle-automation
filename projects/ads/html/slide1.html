<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Slide 1</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #f7f7f5;
      --text: #111111;
      --muted: #5f6368;
      --accent: #ff6b4a;
      --secondary: #5b5f97;
      --card: rgba(255,255,255,0.88);
      --line: rgba(17,17,17,0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #dcdcdc;
      font-family: "Cairo", sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 24px;
    }

    .slide {
      width: 1080px;
      height: 1350px;
      background: var(--bg);
      position: relative;
      overflow: hidden;
      color: var(--text);
      padding: 72px 72px 140px;
      isolation: isolate;
    }

    .slide::before {
      content: "";
      position: absolute;
      width: 540px;
      height: 540px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,107,74,0.10) 0%, rgba(255,107,74,0.03) 55%, rgba(255,107,74,0) 75%);
      top: -170px;
      left: -160px;
      z-index: -2;
    }

    .slide::after {
      content: "";
      position: absolute;
      width: 420px;
      height: 420px;
      border-radius: 50%;
      border: 1px solid rgba(91,95,151,0.12);
      bottom: -140px;
      right: -120px;
      z-index: -2;
    }

    .grid-lines {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(to right, transparent 0, transparent calc(100% - 1px), rgba(17,17,17,0.02) calc(100% - 1px)),
        linear-gradient(to bottom, transparent 0, transparent calc(100% - 1px), rgba(17,17,17,0.02) calc(100% - 1px));
      background-size: 120px 120px;
      pointer-events: none;
      z-index: -3;
    }

    .top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 20px;
      margin-bottom: 26px;
    }

    .label {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 1.2px;
      color: var(--secondary);
      text-transform: uppercase;
      background: rgba(91,95,151,0.08);
      border: 1px solid rgba(91,95,151,0.12);
      padding: 10px 18px;
      border-radius: 999px;
      backdrop-filter: blur(6px);
    }

    .slide-no {
      font-size: 210px;
      font-weight: 900;
      line-height: 0.85;
      color: rgba(17,17,17,0.05);
      user-select: none;
      margin-top: -8px;
    }

    .hero-image {
      position: relative;
      width: 100%;
      height: 510px;
      border-radius: 36px;
      overflow: hidden;
      box-shadow: 0 16px 40px rgba(17,17,17,0.08);
      background: #ddd;
    }

    .hero-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center center;
      display: block;
    }

    .hero-image::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(
        180deg,
        rgba(17,17,17,0.02) 0%,
        rgba(17,17,17,0.08) 100%
      );
    }

    .content-card {
      position: relative;
      margin-top: -48px;
      margin-inline: auto;
      width: calc(100% - 80px);
      background: var(--card);
      border: 1px solid rgba(17,17,17,0.08);
      border-radius: 34px;
      padding: 38px 40px 34px;
      box-shadow: 0 14px 34px rgba(17,17,17,0.07);
      backdrop-filter: blur(10px);
    }

    .content-card::before {
      content: "";
      position: absolute;
      top: 22px;
      right: 24px;
      width: 82px;
      height: 10px;
      border-radius: 999px;
      background: rgba(255,107,74,0.16);
    }

    .mini {
      font-size: 22px;
      font-weight: 700;
      color: var(--muted);
      margin-bottom: 14px;
    }

    .title {
      margin: 0 0 18px;
      font-size: 84px;
      line-height: 1.06;
      font-weight: 900;
      letter-spacing: -1.5px;
    }

    .title .accent {
      color: var(--accent);
    }

    .text {
      margin: 0;
      font-size: 34px;
      line-height: 1.85;
      color: #2c2c2c;
      font-weight: 600;
      max-width: 820px;
    }

    .bottom {
      position: absolute;
      left: 72px;
      right: 72px;
      bottom: 50px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
    }

    .brand {
      font-size: 24px;
      font-weight: 700;
      color: var(--muted);
    }

    .progress {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .progress span {
      display: block;
      width: 48px;
      height: 6px;
      border-radius: 999px;
      background: rgba(17,17,17,0.08);
    }

    .progress span.active {
      width: 76px;
      background: var(--accent);
    }
  </style>
</head>
<body>

  <section class="slide">
    <div class="grid-lines"></div>

    <div class="top">
      <div class="label">رؤية FrameX</div>
      <div class="slide-no">01</div>
    </div>

    <div class="hero-image">
      <img src="slide1-photo.png" alt="صاحبة مشروع تراجع إعلانًا على اللابتوب">
    </div>

    <div class="content-card">
      <div class="mini">Facebook Ads</div>

      <h1 class="title">
        لا تبدأ إعلانك<br>
        <span class="accent">هكذا</span>
      </h1>

      <p class="text">
        كثير من أصحاب المشاريع يبدؤون الإعلان من المكان الخطأ،
        ثم يستغربون بعد ذلك لماذا لا تأتيهم نتائج.
      </p>
    </div>

    <div class="bottom">
      <div class="brand">@framex</div>

      <div class="progress" aria-label="slide progress">
        <span class="active"></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
      </div>
    </div>
  </section>

</body>
</html>
