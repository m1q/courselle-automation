<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Slide 7</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #f7f7f5;
      --text: #111111;
      --muted: #5f6368;
      --accent: #ff6b4a;
      --secondary: #5b5f97;
      --card: rgba(255,255,255,0.92);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #dcdcdc;
      font-family: "Cairo", sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 24px;
    }

    .slide {
      width: 1080px;
      height: 1350px;
      background: var(--bg);
      position: relative;
      overflow: hidden;
      color: var(--text);
      padding: 72px 72px 150px;
      isolation: isolate;
    }

    .slide::before {
      content: "";
      position: absolute;
      width: 580px;
      height: 580px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,107,74,0.10) 0%, rgba(255,107,74,0.03) 55%, rgba(255,107,74,0) 75%);
      top: -220px;
      left: -180px;
      z-index: -2;
    }

    .slide::after {
      content: "";
      position: absolute;
      width: 460px;
      height: 460px;
      border-radius: 50%;
      border: 1px solid rgba(91,95,151,0.12);
      bottom: -170px;
      right: -120px;
      z-index: -2;
    }

    .grid-lines {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(to right, transparent 0, transparent calc(100% - 1px), rgba(17,17,17,0.02) calc(100% - 1px)),
        linear-gradient(to bottom, transparent 0, transparent calc(100% - 1px), rgba(17,17,17,0.02) calc(100% - 1px));
      background-size: 120px 120px;
      pointer-events: none;
      z-index: -3;
    }

    .top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 20px;
      margin-bottom: 20px;
    }

    .label {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 1.2px;
      color: var(--secondary);
      text-transform: uppercase;
      background: rgba(91,95,151,0.08);
      border: 1px solid rgba(91,95,151,0.12);
      padding: 10px 18px;
      border-radius: 999px;
    }

    .slide-no {
      font-size: 210px;
      font-weight: 900;
      line-height: 0.85;
      color: rgba(17,17,17,0.05);
      user-select: none;
      margin-top: -8px;
    }

    .content {
      max-width: 860px;
      margin: 80px auto 0;
      text-align: center;
      position: relative;
    }

    .bg-word {
      position: absolute;
      inset: 30px 0 auto 0;
      text-align: center;
      font-size: 200px;
      font-weight: 900;
      letter-spacing: -6px;
      color: rgba(91,95,151,0.07);
      line-height: 1;
      user-select: none;
      pointer-events: none;
    }

    .mini {
      font-size: 22px;
      font-weight: 700;
      color: var(--muted);
      margin-bottom: 16px;
      position: relative;
      z-index: 2;
    }

    .title {
      margin: 0;
      font-size: 86px;
      line-height: 1.05;
      font-weight: 900;
      letter-spacing: -1.6px;
      position: relative;
      z-index: 2;
    }

    .title .accent {
      color: var(--accent);
    }

    .text-card {
      margin: 36px auto 0;
      max-width: 820px;
      background: var(--card);
      border: 1px solid rgba(17,17,17,0.08);
      border-radius: 34px;
      padding: 34px 36px 30px;
      box-shadow: 0 14px 34px rgba(17,17,17,0.07);
      backdrop-filter: blur(10px);
      position: relative;
      z-index: 2;
    }

    .text-card::before {
      content: "";
      position: absolute;
      top: 22px;
      right: 24px;
      width: 82px;
      height: 10px;
      border-radius: 999px;
      background: rgba(255,107,74,0.16);
    }

    .text {
      margin: 0;
      font-size: 33px;
      line-height: 1.9;
      color: #2c2c2c;
      font-weight: 600;
    }

    .cta-box {
      margin: 26px auto 0;
      max-width: 760px;
      background: #111111;
      color: #ffffff;
      border-radius: 28px;
      padding: 22px 26px;
      box-shadow: 0 14px 30px rgba(0,0,0,0.10);
      position: relative;
      z-index: 2;
    }

    .cta-title {
      margin: 0 0 6px;
      font-size: 34px;
      line-height: 1.5;
      font-weight: 800;
    }

    .cta-text {
      margin: 0;
      font-size: 25px;
      line-height: 1.8;
      font-weight: 600;
      color: rgba(255,255,255,0.88);
    }

    .bottom {
      position: absolute;
      left: 72px;
      right: 72px;
      bottom: 50px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
    }

    .brand {
      font-size: 24px;
      font-weight: 700;
      color: var(--muted);
    }

    .progress {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .progress span {
      display: block;
      width: 48px;
      height: 6px;
      border-radius: 999px;
      background: rgba(17,17,17,0.08);
    }

    .progress span.active {
      width: 76px;
      background: var(--accent);
    }
  </style>
</head>
<body>

  <section class="slide">
    <div class="grid-lines"></div>

    <div class="top">
      <div class="label">رؤية FrameX</div>
      <div class="slide-no">07</div>
    </div>

    <div class="content">
      <div class="bg-word">START</div>

      <div class="mini">Final Step</div>

      <h1 class="title">
        ابدأ صح<br>
        <span class="accent">من البداية</span>
      </h1>

      <div class="text-card">
        <p class="text">
          إذا كنت صاحب مشروع، لا تبدأ إعلانك بشكل عشوائي.
          ابدأ بهدف واضح، ورسالة واضحة، وتنفيذ يخدم النتيجة.
        </p>
      </div>

      <div class="cta-box">
        <h2 class="cta-title">احفظ هذا الكاروسيل</h2>
        <p class="cta-text">
          وارجع له قبل أي إعلان جديد حتى تبدأ من الأساس الصحيح.
        </p>
      </div>
    </div>

    <div class="bottom">
      <div class="brand">@framex</div>

      <div class="progress" aria-label="slide progress">
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span class="active"></span>
      </div>
    </div>
  </section>

</body>
</html>
