<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FrameX - Slide 7</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f7f7f5;
      --text: #111111;
      --muted: #5f6368;
      --accent: #ff6b4a;
      --line: rgba(17,17,17,0.08);
      --card-dark: #111111;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: #dcdcdc;
      font-family: "Cairo", sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .slide {
      width: 1080px;
      height: 1350px;
      position: relative;
      overflow: hidden;
      color: var(--text);
      background: var(--bg);
    }

    .grid-lines {
      position: absolute;
      inset: 0;
      background-image: linear-gradient(var(--line) 1px, transparent 1px), linear-gradient(90deg, var(--line) 1px, transparent 1px);
      background-size: 100px 100px;
      z-index: 1;
    }

    .top {
      position: absolute;
      top: 60px;
      left: 72px;
      right: 72px;
      z-index: 10;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .label {
      font-size: 22px;
      font-weight: 800;
      border: 1px solid var(--text);
      padding: 10px 20px;
      border-radius: 999px;
    }

    .counter {
      font-size: 24px;
      font-weight: 700;
      color: var(--muted);
    }

    .content {
      position: relative;
      z-index: 10;
      padding: 200px 72px 0;
    }

    .bg-word {
      position: absolute;
      top: 100px;
      right: -20px;
      font-size: 280px;
      font-weight: 900;
      color: rgba(17,17,17,0.03);
      z-index: -1;
      pointer-events: none;
    }

    .title {
      font-size: 85px;
      font-weight: 900;
      line-height: 1.1;
      margin-bottom: 50px;
    }

    .accent-text { color: var(--accent); }

    .summary-list {
      display: flex;
      flex-direction: column;
      gap: 20px;
      margin-bottom: 60px;
    }

    .summary-item {
      font-size: 32px;
      font-weight: 800;
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .summary-item::before {
      content: "";
      width: 12px;
      height: 12px;
      background: var(--accent);
      border-radius: 50%;
    }

    .cta-card {
      background: var(--card-dark);
      color: white;
      padding: 60px;
      border-radius: 32px;
      text-align: center;
      box-shadow: 0 30px 60px rgba(0,0,0,0.15);
    }

    .cta-card p {
      font-size: 32px;
      font-weight: 700;
      margin: 0 0 30px;
      line-height: 1.5;
    }

    .cta-button {
      display: inline-block;
      background: var(--accent);
      color: white;
      padding: 20px 60px;
      border-radius: 999px;
      font-size: 32px;
      font-weight: 900;
      text-decoration: none;
    }

    .footer {
      position: absolute;
      bottom: 50px;
      left: 72px;
      right: 72px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .brand { font-size: 28px; font-weight: 800; }

    .progress { display: flex; gap: 10px; }
    .progress span { width: 48px; height: 6px; border-radius: 999px; background: var(--line); }
    .progress span.active { width: 76px; background: var(--accent); }
  </style>
</head>
<body>

  <section class="slide">
    <div class="grid-lines"></div>

    <div class="top">
      <div class="label">رؤية FrameX</div>
      <div class="counter">7/7</div>
    </div>

    <div class="content">
      <div class="bg-word">نتائج</div>
      
      <h1 class="title">الخلاصة:<br>النتيجة تبدأ من <span class="accent-text">الأساس</span></h1>

      <div class="summary-list">
        <div class="summary-item">حدد هدفك بوضوح</div>
        <div class="summary-item">صمم عرضاً لا يُرفض</div>
        <div class="summary-item">سهّل رحلة الشراء</div>
        <div class="summary-item">استهدف الشخص المناسب</div>
      </div>

      <div class="cta-card">
        <p>لا تضيع ميزانيتك على إعلانات لا تبيع.<br>دعنا نبني لك استراتيجية تحقق نتائج حقيقية.</p>
        <div class="cta-button">تواصل معنا الآن</div>
      </div>
    </div>

    <div class="footer">
      <div class="brand">@framex</div>
      <div class="progress">
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span class="active"></span>
      </div>
    </div>
  </section>

</body>
</html>
