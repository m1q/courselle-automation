<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FrameX - Slide 3</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f7f7f5;
      --text: #111111;
      --muted: #5f6368;
      --accent: #ff6b4a;
      --line: rgba(17,17,17,0.08);
      --card: #ffffff;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: #dcdcdc;
      font-family: "Cairo", sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .slide {
      width: 1080px;
      height: 1350px;
      position: relative;
      overflow: hidden;
      color: var(--text);
      background: var(--bg);
    }

    .grid-lines {
      position: absolute;
      inset: 0;
      background-image: linear-gradient(var(--line) 1px, transparent 1px), linear-gradient(90deg, var(--line) 1px, transparent 1px);
      background-size: 100px 100px;
      z-index: 1;
    }

    .top {
      position: absolute;
      top: 60px;
      left: 72px;
      right: 72px;
      z-index: 10;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .label {
      font-size: 22px;
      font-weight: 800;
      border: 1px solid var(--text);
      padding: 10px 20px;
      border-radius: 999px;
    }

    .counter {
      font-size: 24px;
      font-weight: 700;
      color: var(--muted);
    }

    .content {
      position: relative;
      z-index: 10;
      padding: 200px 72px 0;
    }

    .mini {
      font-size: 28px;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 15px;
    }

    .title {
      font-size: 85px;
      font-weight: 900;
      line-height: 1.1;
      margin-bottom: 40px;
    }

    .accent-text { color: var(--accent); }

    /* الكرت التعليمي */
    .main-card {
      background: var(--card);
      padding: 60px;
      border-radius: 32px;
      border: 1px solid var(--line);
      box-shadow: 0 20px 40px rgba(0,0,0,0.03);
    }

    .main-card h2 {
      font-size: 42px;
      font-weight: 800;
      margin-bottom: 25px;
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .main-card h2::before {
      content: "";
      width: 12px;
      height: 40px;
      background: var(--accent);
      border-radius: 4px;
    }

    .main-card p {
      font-size: 30px;
      line-height: 1.6;
      color: var(--muted);
      margin-bottom: 40px;
    }

    .checklist {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .check-item {
      font-size: 26px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .check-item::before {
      content: "✕"; /* علامة تعبيرية للرفض بأسلوب استراتيجي */
      color: #e74c3c;
      font-weight: 900;
    }

    .footer {
      position: absolute;
      bottom: 50px;
      left: 72px;
      right: 72px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 10;
    }

    .brand { font-size: 28px; font-weight: 800; }

    .progress { display: flex; gap: 10px; }
    .progress span { width: 48px; height: 6px; border-radius: 999px; background: var(--line); }
    .progress span.active { width: 76px; background: var(--accent); }
  </style>
</head>
<body>

  <section class="slide">
    <div class="grid-lines"></div>

    <div class="top">
      <div class="label">رؤية FrameX</div>
      <div class="counter">3/7</div>
    </div>

    <div class="content">
      <p class="mini">السبب الأول</p>
      <h1 class="title">العرض <span class="accent-text">ضعيف</span></h1>

      <div class="main-card">
        <h2>مو كل منتج جيد يبيع نفسه</h2>
        <p>الناس لا تشتري "المنتج"، بل تشتري "العرض" (The Offer). إذا كان عرضك لا يحل مشكلة حقيقية أو يبدو باهظاً مقارنة بالقيمة، لن يضغط أحد.</p>
        
        <div class="checklist">
          <div class="check-item">السعر غير واضح أو غير مبرر</div>
          <div class="check-item">لا يوجد ضمان أو تقليل مخاطرة</div>
          <div class="check-item">العرض يشبه مئات المنافسين الآخرين</div>
        </div>
      </div>
    </div>

    <div class="footer">
      <div class="brand">@framex</div>
      <div class="progress">
        <span></span>
        <span></span>
        <span class="active"></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
      </div>
    </div>
  </section>

</body>
</html>
