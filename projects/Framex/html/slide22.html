<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FrameX - Slide 2</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f7f7f5;
      --text: #111111;
      --muted: #5f6368;
      --accent: #ff6b4a;
      --line: rgba(17,17,17,0.08);
      --card: rgba(255,255,255,0.95);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: #dcdcdc;
      font-family: "Cairo", sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .slide {
      width: 1080px;
      height: 1350px;
      position: relative;
      overflow: hidden;
      color: var(--text);
      background: var(--bg);
    }

    /* خطوط الشبكة الخفيفة لإعطاء مظهر Editorial */
    .grid-lines {
      position: absolute;
      inset: 0;
      background-image: 
        linear-gradient(var(--line) 1px, transparent 1px),
        linear-gradient(90deg, var(--line) 1px, transparent 1px);
      background-size: 100px 100px;
      z-index: 1;
    }

    .top {
      position: absolute;
      top: 60px;
      left: 72px;
      right: 72px;
      z-index: 10;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .label {
      font-size: 22px;
      font-weight: 800;
      color: var(--text);
      border: 1px solid var(--text);
      padding: 10px 20px;
      border-radius: 999px;
    }

    .counter {
      font-size: 24px;
      font-weight: 700;
      color: var(--muted);
    }

    .content {
      position: relative;
      z-index: 10;
      padding: 200px 72px 0;
    }

    .bg-word {
      position: absolute;
      top: 120px;
      right: 50px;
      font-size: 250px;
      font-weight: 900;
      color: rgba(17,17,17,0.03);
      z-index: -1;
      pointer-events: none;
    }

    .mini {
      font-size: 28px;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 20px;
    }

    .title {
      font-size: 80px;
      font-weight: 900;
      line-height: 1.2;
      margin: 0 0 50px;
    }

    .accent-text {
      color: var(--accent);
    }

    /* كروت المقارنة */
    .comparison {
      display: flex;
      flex-direction: column;
      gap: 30px;
    }

    .compare-card {
      background: var(--card);
      padding: 40px;
      border-radius: 24px;
      border: 1px solid var(--line);
      box-shadow: 0 10px 30px rgba(0,0,0,0.02);
    }

    .compare-card h2 {
      margin: 0 0 15px;
      font-size: 32px;
      font-weight: 800;
    }

    .compare-card p {
      margin: 0;
      font-size: 26px;
      line-height: 1.6;
      color: var(--muted);
      font-weight: 600;
    }

    .footer {
      position: absolute;
      bottom: 50px;
      left: 72px;
      right: 72px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 10;
    }

    .brand {
      font-size: 28px;
      font-weight: 800;
      color: var(--text);
    }

    .progress {
      display: flex;
      gap: 10px;
    }

    .progress span {
      width: 48px;
      height: 6px;
      border-radius: 999px;
      background: var(--line);
    }

    .progress span.active {
      width: 76px;
      background: var(--accent);
    }
  </style>
</head>
<body>

  <section class="slide">
    <div class="grid-lines"></div>

    <div class="top">
      <div class="label">رؤية FrameX</div>
      <div class="counter">2/7</div>
    </div>

    <div class="content">
      <div class="bg-word">تحويل</div>
      
      <p class="mini">الفرق الجوهري</p>
      <h1 class="title">
        الناس شافوا..<br>
        بس <span class="accent-text">ما اشتروا؟</span>
      </h1>

      <div class="comparison">
        <div class="compare-card">
          <h2>الوصول (Reach)</h2>
          <p>هو مجرد ظهور إعلانك أمام أعين الناس، فيسبوك يتقاضى المال مقابل هذا الظهور فقط.</p>
        </div>

        <div class="compare-card">
          <h2 style="color: var(--accent);">التحويل (Conversion)</h2>
          <p>هو إقناع هذا الشخص بالضغط، السؤال، ثم الشراء. وهذا يتطلب استراتيجية، لا مجرد ميزانية.</p>
        </div>
      </div>
    </div>

    <div class="footer">
      <div class="brand">@framex</div>
      <div class="progress">
        <span></span>
        <span class="active"></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
      </div>
    </div>
  </section>

</body>
</html>
