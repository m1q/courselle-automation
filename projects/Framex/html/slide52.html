<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FrameX - Slide 5</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f7f7f5;
      --text: #111111;
      --muted: #5f6368;
      --accent: #ff6b4a;
      --line: rgba(17,17,17,0.08);
      --card: rgba(255,255,255,0.98);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: #dcdcdc;
      font-family: "Cairo", sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .slide {
      width: 1080px;
      height: 1350px;
      position: relative;
      overflow: hidden;
      color: var(--text);
      background: var(--bg);
    }

    /* الجزء العلوي: الصورة */
    .image-container {
      width: 100%;
      height: 600px;
      position: relative;
      overflow: hidden;
    }

    .image-container img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* الكرت النصي المتداخل */
    .content-card {
      position: absolute;
      top: 520px;
      left: 72px;
      right: 72px;
      background: var(--card);
      padding: 60px;
      border-radius: 32px;
      border: 1px solid var(--line);
      box-shadow: 0 20px 50px rgba(0,0,0,0.05);
      z-index: 10;
    }

    .top-meta {
      position: absolute;
      top: 40px;
      left: 72px;
      right: 72px;
      z-index: 20;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .label {
      font-size: 22px;
      font-weight: 800;
      background: rgba(255, 255, 255, 0.9);
      padding: 10px 20px;
      border-radius: 999px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
    }

    .counter {
      font-size: 24px;
      font-weight: 700;
      color: white;
      text-shadow: 0 2px 10px rgba(0,0,0,0.3);
    }

    .mini {
      font-size: 28px;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 15px;
    }

    .title {
      font-size: 80px;
      font-weight: 900;
      line-height: 1.1;
      margin-bottom: 30px;
    }

    .accent-text { color: var(--accent); }

    .description {
      font-size: 28px;
      line-height: 1.6;
      color: var(--muted);
      margin-bottom: 40px;
    }

    .points {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .point {
      font-size: 26px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .point::before {
      content: "";
      width: 10px;
      height: 10px;
      background: var(--accent);
      border-radius: 50%;
    }

    .footer {
      position: absolute;
      bottom: 50px;
      left: 72px;
      right: 72px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .brand { font-size: 28px; font-weight: 800; }

    .progress { display: flex; gap: 10px; }
    .progress span { width: 48px; height: 6px; border-radius: 999px; background: var(--line); }
    .progress span.active { width: 76px; background: var(--accent); }
  </style>
</head>
<body>

  <section class="slide">
    <div class="top-meta">
      <div class="label">رؤية FrameX</div>
      <div class="counter">5/7</div>
    </div>

    <div class="image-container">
      <img src="https://images.unsplash.com/photo-1556742044-3c52d6e88c62?q=80&w=1080&auto=format&fit=crop" alt="Trust and Security">
    </div>

    <div class="content-card">
      <p class="mini">السبب الثالث</p>
      <h1 class="title">الزبون <span class="accent-text">لا يثق بك</span></h1>
      
      <p class="description">
        الإعلان الجذب انتباهي، لكن عندما دخلت لصفحتك لم أجد ما يطمئنني للشراء.
      </p>

      <div class="points">
        <div class="point">لا توجد تقييمات لزبائن سابقين</div>
        <div class="point">هوية الصفحة تبدو غير احترافية أو "مجهولة"</div>
        <div class="point">لا توجد صور حقيقية للمنتج على أرض الواقع</div>
      </div>
    </div>

    <div class="footer">
      <div class="brand">@framex</div>
      <div class="progress">
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span class="active"></span>
        <span></span>
        <span></span>
      </div>
    </div>
  </section>

</body>
</html>
