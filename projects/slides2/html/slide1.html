<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    
  <style>
    :root {
            /* لون الشريحة الأخيرة - أبيض عاجي هادئ */
            --primary-light: #fafac6; 
            --bg-dark: #111111;
            --card-width: 900px;
            --card-height: 1100px;
        }

        body {
            background-color: var(--bg-dark);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 1350px;
            width: 1080px;
            font-family: 'Cairo', sans-serif;
            overflow: hidden;
            perspective: 2000px;,
          
        }

        .slide-container {
            position: relative;
            width: var(--card-width);
            height: var(--card-height);
            /* استعادة الاستقامة لتوحي بالاستقرار والختام */
            transform: rotateX(0deg); 
        }

        /* تلميح للبطاقة السابقة (الصفراء - تظهر من الأعلى بكثافة أكبر) */
        .slide-container::before {
            content: "";
            position: absolute;
            top: -60px;
            left: 50%;
            transform: translateX(-50%) scale(0.94);
            width: 90%;
            height: 100px;
            background: #ffe600;
            border-radius: 60px 60px 0 0;
            opacity: 0.5;
            z-index: 1;
        }

        /* البطاقة الأساسية (الشريحة 04) */
        .main-card {
            position: relative;
            width: 100%;
            height: 100%;
            background: var(--primary-light);
            border-radius: 60px;
            z-index: 2;
            box-shadow: 0 40px 100px rgba(250, 250, 198, 0.2);
            display: flex;
            flex-direction: column;
            padding: 80px;
            box-sizing: border-box;
            color: #111;
            text-align: center; /* توسيط المحتوى للختام */
        }

        .number-bg {
            position: absolute;
            top: -20px;
            right: 40px;
            font-size: 250px;
            font-weight: 900;
            opacity: 0.05;
            line-height: 1;
        }

        .brand-logo {
            font-size: 40px;
            font-weight: 900;
            margin-bottom: 80px;
            letter-spacing: 4px;
        }

        h1 {
            font-size: 85px;
            font-weight: 900;
            line-height: 1.2;
            margin: 0 auto;
            margin-bottom: 50px;
            max-width: 90%;
        }

        .cta-box {
            background: #111;
            color: #fff;
            padding: 40px;
            border-radius: 30px;
            margin-top: auto;
            font-size: 45px;
            font-weight: 700;
            display: inline-block;
            transition: transform 0.3s;
        }

        p {
            font-size: 34px;
            line-height: 1.6;
            opacity: 0.8;
            margin: 40px 0;
        }

        .social-handle {
            font-size: 28px;
            font-weight: 700;
            margin-top: 30px;
            opacity: 0.6;
            letter-spacing: 1px;
        }
    
  </style>
</head>
<body>

    <div class="slide-container">
        <div class="main-card">
            <span class="number-bg">04</span>
            
            <div class="brand-logo">FRAMEX</div>

            <h1>هل أنت مستعد لتكون الرقم (1) في مجالك؟</h1>

            <p>لا تدع مستقبلك للتخمين. احجز استشارتك المجانية اليوم ودعنا نخطط لنمو علامتك التجارية.</p>

            <div class="cta-box">
                أرسل "نمو" في الخاص 📩
            </div>

            <div class="social-handle">@FRAMEX_AGENCY</div>
        </div>
    </div>

</body>
</html>
