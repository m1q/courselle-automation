<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>FrameX - Slide 2</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    :root { --bg: #f7f7f5; --text: #111111; --accent: #ff6b4a; --line: rgba(17,17,17,0.06); }
    * { box-sizing: border-box; font-family: 'Cairo', sans-serif; margin: 0; padding: 0; }
    body { background: #dcdcdc; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .slide { width: 1080px; height: 1350px; background: var(--bg); color: var(--text); position: relative; overflow: hidden; }
    .grid { position: absolute; inset: 0; background-image: linear-gradient(var(--line) 1px, transparent 1px), linear-gradient(90deg, var(--line) 1px, transparent 1px); background-size: 80px 80px; }
    .bg-word { position: absolute; top: 150px; right: -50px; font-size: 350px; font-weight: 900; color: rgba(17,17,17,0.03); transform: rotate(-5deg); }
    .top { position: absolute; top: 80px; left: 80px; right: 80px; display: flex; justify-content: space-between; align-items: center; }
    .label { font-size: 24px; font-weight: 800; border: 1px solid var(--text); padding: 12px 30px; border-radius: 999px; }
    .counter { font-size: 28px; font-weight: 700; opacity: 0.5; }
    .content { padding: 250px 80px 0; position: relative; z-index: 10; }
    .mini { font-size: 35px; font-weight: 700; color: var(--accent); margin-bottom: 20px; }
    .title { font-size: 90px; font-weight: 900; line-height: 1.2; margin-bottom: 60px; }
    .card { background: #ffffff; padding: 60px; border-radius: 40px; box-shadow: 0 30px 60px rgba(0,0,0,0.05); border: 1px solid var(--line); }
    .card p { font-size: 38px; font-weight: 700; line-height: 1.6; color: #333; }
    .footer { position: absolute; bottom: 60px; left: 80px; right: 80px; display: flex; justify-content: space-between; align-items: center; }
    .brand { font-size: 32px; font-weight: 900; }
    .progress { display: flex; gap: 15px; }
    .progress span { width: 50px; height: 8px; border-radius: 10px; background: var(--line); }
    .progress span.active { width: 80px; background: var(--accent); }
  </style>
</head>
<body>
  <div class="slide">
    <div class="grid"></div>
    <div class="bg-word">Seen</div>
    <div class="top"><div class="label">نصائح FrameX</div><div class="counter">2/7</div></div>
    <div class="content">
      <p class="mini">الحقيقة المرة</p>
      <h1 class="title">تفرح بالرسالة..<br><span style="color:var(--accent)">وتنصدم بالسكوت.</span></h1>
      <div class="card"><p>تصرف فلوس ع الإعلان، يجيك مسج، ترد "السعر 25 ألف".. وبعدها الزبون يتبخر. الخلل بطريقة الرد مو بالسعر!</p></div>
    </div>
    <div class="footer"><div class="brand">@framex</div><div class="progress"><span></span><span class="active"></span><span></span><span></span><span></span><span></span><span></span></div></div>
  </div>
</body>
</html>
