<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FrameX - Slide 1</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    :root { --bg: #0f0f10; --text: #ffffff; --accent: #ff6b4a; }
    * { box-sizing: border-box; font-family: 'Cairo', sans-serif; margin: 0; padding: 0; }
    body { background: #dcdcdc; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .slide { width: 1080px; height: 1350px; background: var(--bg); color: var(--text); position: relative; overflow: hidden; }
    .hero-img { position: absolute; inset: 0; }
    .hero-img img { width: 100%; height: 100%; object-fit: cover; opacity: 0.4; filter: grayscale(100%); }
    .hero-img::after { content: ""; position: absolute; inset: 0; background: linear-gradient(180deg, transparent 0%, rgba(15,15,16,1) 90%); }
    .top { position: absolute; top: 80px; left: 80px; right: 80px; display: flex; justify-content: space-between; align-items: center; z-index: 10; }
    .label { font-size: 24px; font-weight: 800; border: 1px solid rgba(255,255,255,0.3); padding: 12px 30px; border-radius: 999px; }
    .counter { font-size: 28px; font-weight: 700; opacity: 0.6; }
    .main-content { position: absolute; bottom: 200px; left: 80px; right: 80px; z-index: 10; }
    .mini { font-size: 35px; font-weight: 700; color: var(--accent); margin-bottom: 20px; }
    .title { font-size: 100px; font-weight: 900; line-height: 1.1; }
    .accent { color: var(--accent); }
    .footer { position: absolute; bottom: 60px; left: 80px; right: 80px; display: flex; justify-content: space-between; align-items: center; }
    .brand { font-size: 32px; font-weight: 900; }
    .progress { display: flex; gap: 15px; }
    .progress span { width: 50px; height: 8px; border-radius: 10px; background: rgba(255,255,255,0.2); }
    .progress span.active { width: 80px; background: var(--accent); }
  </style>
</head>
<body>
  <div class="slide">
    <div class="hero-img"><img src="https://images.unsplash.com/photo-1528747045269-390fe33c19f2?q=80&w=1080" alt="Ghosting"></div>
    <div class="top"><div class="label">نصائح FrameX</div><div class="counter">1/7</div></div>
    <div class="main-content">
      <p class="mini">أكبر مشكلة تواجه البيجات</p>
      <h1 class="title">يكتبلك: شكد السعر؟<br>وبعدين.. <span class="accent">يختفي!</span></h1>
    </div>
    <div class="footer"><div class="brand">@framex</div><div class="progress"><span class="active"></span><span></span><span></span><span></span><span></span><span></span><span></span></div></div>
  </div>
</body>
</html>
