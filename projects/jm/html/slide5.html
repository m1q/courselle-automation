<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>FrameX - Slide 5</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    :root { --bg: #f7f7f5; --text: #111111; --accent: #ff6b4a; }
    * { box-sizing: border-box; font-family: 'Cairo', sans-serif; margin: 0; padding: 0; }
    body { background: #dcdcdc; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .slide { width: 1080px; height: 1350px; background: var(--bg); color: var(--text); position: relative; overflow: hidden; }
    .img-box { width: 100%; height: 650px; overflow: hidden; position: relative; }
    .img-box img { width: 100%; height: 100%; object-fit: cover; }
    .img-box::after { content: ""; position: absolute; inset: 0; background: linear-gradient(0deg, var(--bg) 0%, transparent 40%); }
    .content { padding: 50px 80px; margin-top: -100px; position: relative; z-index: 10; }
    .card { background: #fff; padding: 60px; border-radius: 45px; box-shadow: 0 40px 80px rgba(0,0,0,0.1); border: 1px solid rgba(0,0,0,0.05); }
    .mini { font-size: 35px; font-weight: 700; color: var(--accent); margin-bottom: 15px; }
    .title { font-size: 85px; font-weight: 900; line-height: 1.1; margin-bottom: 30px; }
    .desc { font-size: 32px; font-weight: 600; color: #555; line-height: 1.6; }
    .footer { position: absolute; bottom: 60px; left: 80px; right: 80px; display: flex; justify-content: space-between; align-items: center; }
    .brand { font-size: 32px; font-weight: 900; }
    .progress span { width: 50px; height: 8px; border-radius: 10px; background: rgba(0,0,0,0.05); display: inline-block; }
    .progress span.active { width: 80px; background: var(--accent); }
  </style>
</head>
<body>
  <div class="slide">
    <div class="img-box"><img src="https://images.unsplash.com/photo-1556742049-0cfed4f6a45d?q=80&w=1080" alt="Customer Care"></div>
    <div class="content">
      <div class="card">
        <p class="mini">القاعدة الذهبية</p>
        <h1 class="title">السعر يجي <span style="color:var(--accent)">"بالأخير"</span></h1>
        <p class="desc">إذا انطيت السعر بالبداية، المحادثة انتهت. اخلق "مشكلة" وحلها بمنتجك، وبعدين كوله السعر حتى يشوفه رخيص ومستحق.</p>
      </div>
    </div>
    <div class="footer"><div class="brand">@framex</div><div class="progress"><span></span><span></span><span></span><span></span><span class="active"></span><span></span><span></span></div></div>
  </div>
</body>
</html>
