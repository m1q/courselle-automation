<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Instagram Carousel - Slide 2</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #f7f7f5;
      --text: #111111;
      --muted: #5f6368;
      --accent: #ff6b4a;
      --secondary: #5b5f97;
      --card: rgba(255,255,255,0.65);
      --line: rgba(17,17,17,0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #dcdcdc;
      font-family: "Cairo", sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 24px;
    }

    .slide {
      width: 1080px;
      height: 1350px;
      background: var(--bg);
      color: var(--text);
      position: relative;
      overflow: hidden;
      padding: 72px;
      isolation: isolate;
    }

    .slide::before {
      content: "";
      position: absolute;
      width: 460px;
      height: 460px;
      border-radius: 50%;
      border: 1px solid rgba(91,95,151,0.12);
      top: 230px;
      left: 90px;
      z-index: -2;
    }

    .slide::after {
      content: "";
      position: absolute;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,107,74,0.12) 0%, rgba(255,107,74,0.03) 60%, rgba(255,107,74,0) 75%);
      bottom: 80px;
      right: 40px;
      z-index: -2;
    }

    .grid-lines {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(to right, transparent 0, transparent calc(100% - 1px), rgba(17,17,17,0.02) calc(100% - 1px)),
        linear-gradient(to bottom, transparent 0, transparent calc(100% - 1px), rgba(17,17,17,0.02) calc(100% - 1px));
      background-size: 120px 120px;
      pointer-events: none;
      z-index: -3;
    }

    .top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 70px;
    }

    .label {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 1.5px;
      color: var(--secondary);
      text-transform: uppercase;
      background: rgba(91,95,151,0.08);
      border: 1px solid rgba(91,95,151,0.12);
      padding: 10px 18px;
      border-radius: 999px;
    }

    .slide-no {
      font-size: 210px;
      font-weight: 900;
      line-height: 0.85;
      color: rgba(17,17,17,0.05);
      user-select: none;
    }

    .layout {
      display: grid;
      grid-template-columns: 1.15fr 0.85fr;
      gap: 20px;
      align-items: center;
      height: 860px;
    }

    .content {
      max-width: 620px;
    }

    .mini {
      font-size: 24px;
      font-weight: 700;
      color: var(--muted);
      margin-bottom: 20px;
    }

    .title {
      margin: 0 0 26px;
      font-size: 92px;
      line-height: 1.08;
      font-weight: 900;
      letter-spacing: -1.5px;
    }

    .title .accent {
      color: var(--accent);
    }

    .text-box {
      background: var(--card);
      border: 1px solid rgba(17,17,17,0.08);
      border-radius: 28px;
      padding: 28px 30px;
      box-shadow: 0 10px 30px rgba(17,17,17,0.04);
      max-width: 590px;
    }

    .text {
      margin: 0;
      font-size: 36px;
      line-height: 1.8;
      color: #2c2c2c;
      font-weight: 600;
    }

    .visual {
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      height: 100%;
    }

    .circle {
      width: 330px;
      height: 330px;
      border-radius: 50%;
      border: 2px solid rgba(91,95,151,0.18);
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      background: rgba(255,255,255,0.28);
      backdrop-filter: blur(6px);
    }

    .circle::before {
      content: "";
      position: absolute;
      inset: 22px;
      border-radius: 50%;
      border: 1px dashed rgba(17,17,17,0.12);
    }

    .number {
      font-size: 110px;
      font-weight: 900;
      color: var(--secondary);
      line-height: 1;
    }

    .tag {
      position: absolute;
      bottom: 180px;
      right: 90px;
      background: #111;
      color: #fff;
      border-radius: 18px;
      padding: 12px 18px;
      font-size: 22px;
      font-weight: 800;
      box-shadow: 0 12px 24px rgba(0,0,0,0.10);
    }

    .icon {
      position: absolute;
      top: 160px;
      left: 110px;
      font-size: 46px;
    }

    .bottom {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 40px;
    }

    .brand {
      font-size: 24px;
      font-weight: 700;
      color: var(--muted);
    }

    .progress {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .progress span {
      display: block;
      width: 48px;
      height: 6px;
      border-radius: 999px;
      background: rgba(17,17,17,0.08);
    }

    .progress span.active {
      width: 76px;
      background: var(--accent);
    }
  </style>
</head>
<body>

  <section class="slide">
    <div class="grid-lines"></div>

    <div class="top">
      <div class="label">SMALL STEPS</div>
      <div class="slide-no">02</div>
    </div>

    <div class="layout">
      <div class="content">
        <div class="mini">Habit 1</div>

        <h1 class="title">
          ابدأ<br>
          <span class="accent">بدقائق قليلة</span>
        </h1>

        <div class="text-box">
          <p class="text">
            ⏱️ لا تنتظر الحماس الكبير.<br>
            ابدأ بأي عادة لمدة 5 دقائق فقط، لأن البداية الصغيرة أسهل من التأجيل الكبير.
          </p>
        </div>
      </div>

      <div class="visual">
        <div class="icon">⏱️</div>
        <div class="circle">
          <div class="number">01</div>
        </div>
      </div>
    </div>

    <div class="tag">ابدأ ببساطة</div>

    <div class="bottom">
      <div class="brand">@yourpage</div>

      <div class="progress" aria-label="slide progress">
        <span></span>
        <span class="active"></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
      </div>
    </div>
  </section>

</body>
</html>
