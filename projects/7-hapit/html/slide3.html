<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Instagram Carousel - Slide 3</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #f7f7f5;
      --bg-soft: #fff8f0;
      --text: #111111;
      --muted: #5f6368;
      --accent: #ff6b4a;
      --secondary: #5b5f97;
      --card: rgba(255,255,255,0.72);
      --line: rgba(17,17,17,0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #dcdcdc;
      font-family: "Cairo", sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 24px;
    }

    .slide {
      width: 1080px;
      height: 1350px;
      background:
        linear-gradient(180deg, var(--bg-soft) 0%, var(--bg) 38%, var(--bg) 100%);
      color: var(--text);
      position: relative;
      overflow: hidden;
      padding: 72px;
      isolation: isolate;
    }

    .slide::before {
      content: "";
      position: absolute;
      width: 700px;
      height: 260px;
      background: radial-gradient(circle, rgba(255,107,74,0.12) 0%, rgba(255,107,74,0.03) 60%, rgba(255,107,74,0) 78%);
      top: -40px;
      left: 50%;
      transform: translateX(-50%);
      border-radius: 50%;
      z-index: -2;
    }

    .slide::after {
      content: "";
      position: absolute;
      width: 420px;
      height: 420px;
      border-radius: 50%;
      border: 1px solid rgba(255,107,74,0.10);
      bottom: -160px;
      left: -120px;
      z-index: -2;
    }

    .grid-lines {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(to right, transparent 0, transparent calc(100% - 1px), rgba(17,17,17,0.02) calc(100% - 1px)),
        linear-gradient(to bottom, transparent 0, transparent calc(100% - 1px), rgba(17,17,17,0.02) calc(100% - 1px));
      background-size: 120px 120px;
      pointer-events: none;
      z-index: -3;
    }

    .top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 52px;
    }

    .label {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 1.5px;
      color: var(--secondary);
      text-transform: uppercase;
      background: rgba(91,95,151,0.08);
      border: 1px solid rgba(91,95,151,0.12);
      padding: 10px 18px;
      border-radius: 999px;
    }

    .slide-no {
      font-size: 210px;
      font-weight: 900;
      line-height: 0.85;
      color: rgba(17,17,17,0.05);
      user-select: none;
    }

    .hero {
      position: relative;
      margin-top: 10px;
      min-height: 760px;
    }

    .sun-arc {
      width: 280px;
      height: 140px;
      border: 3px solid rgba(255,107,74,0.18);
      border-bottom: 0;
      border-top-left-radius: 180px;
      border-top-right-radius: 180px;
      margin: 0 auto 24px;
      position: relative;
    }

    .sun-arc::before {
      content: "☀️";
      position: absolute;
      top: 42px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 42px;
    }

    .mini {
      text-align: center;
      font-size: 24px;
      font-weight: 700;
      color: var(--muted);
      margin-bottom: 16px;
    }

    .title {
      text-align: center;
      margin: 0;
      font-size: 94px;
      line-height: 1.08;
      font-weight: 900;
      letter-spacing: -1.5px;
    }

    .title .accent {
      color: var(--accent);
    }

    .content-card {
      margin: 38px auto 0;
      width: 100%;
      max-width: 760px;
      background: var(--card);
      border: 1px solid rgba(17,17,17,0.08);
      border-radius: 32px;
      padding: 34px 34px 32px;
      box-shadow: 0 12px 30px rgba(17,17,17,0.05);
      backdrop-filter: blur(10px);
      position: relative;
    }

    .content-card::before {
      content: "";
      position: absolute;
      top: 22px;
      right: 24px;
      width: 78px;
      height: 10px;
      border-radius: 999px;
      background: rgba(255,107,74,0.16);
    }

    .text {
      margin: 0;
      font-size: 36px;
      line-height: 1.9;
      color: #2b2b2b;
      font-weight: 600;
      text-align: center;
    }

    .badge {
      position: absolute;
      top: 450px;
      right: 86px;
      background: #111;
      color: #fff;
      border-radius: 18px;
      padding: 12px 18px;
      font-size: 22px;
      font-weight: 800;
      box-shadow: 0 12px 24px rgba(0,0,0,0.10);
    }

    .soft-line {
      width: 180px;
      height: 6px;
      border-radius: 999px;
      background: rgba(91,95,151,0.10);
      margin: 26px auto 0;
    }

    .bottom {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 36px;
    }

    .brand {
      font-size: 24px;
      font-weight: 700;
      color: var(--muted);
    }

    .progress {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .progress span {
      display: block;
      width: 48px;
      height: 6px;
      border-radius: 999px;
      background: rgba(17,17,17,0.08);
    }

    .progress span.active {
      width: 76px;
      background: var(--accent);
    }
  </style>
</head>
<body>

  <section class="slide">
    <div class="grid-lines"></div>

    <div class="top">
      <div class="label">MORNING RESET</div>
      <div class="slide-no">03</div>
    </div>

    <div class="hero">
      <div class="sun-arc"></div>

      <div class="mini">Habit 2</div>

      <h1 class="title">
        رتّب صباحك<br>
        <span class="accent">أولًا</span>
      </h1>

      <div class="content-card">
        <p class="text">
          🌅 أول ساعة من يومك تصنع شكل اليوم كله.<br>
          ابتعد عن الفوضى والموبايل، وابدأ بشيء يفيدك قبل أي شيء يشتتك.
        </p>
      </div>

      <div class="soft-line"></div>
    </div>

    <div class="badge">ابدأ بهدوء</div>

    <div class="bottom">
      <div class="brand">@yourpage</div>

      <div class="progress" aria-label="slide progress">
        <span></span>
        <span></span>
        <span class="active"></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
      </div>
    </div>
  </section>

</body>
</html>
